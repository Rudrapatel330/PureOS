<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #1a1a2e;
            color: #e94560;
            font-size: 18px;
            font-family: sans-serif;
            margin: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid #e94560;
            padding: 20px;
            opacity: 0.9;
        }
        .header h1 {
            color: #0f3460;
            background-color: #e94560;
            padding: 10px;
            border-radius: 5px;
        }
        .item {
            margin: 10px;
            padding: 15px;
            background-color: #16213e;
            border-width: 1px;
            border-color: #e94560;
            text-align: center;
            width: 80%;
        }
        .btn {
            background-color: #e94560;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn.primary {
            background-color: #0f3460;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PureBrowser Pro</h1>
        </div>
        <div id="content" class="item">
            Welcome to the upgraded browser engine!
        </div>
        <button id="updateBtn" class="btn primary">Update Content</button>
    </div>

    <script>
        var btn = document.getElementById("updateBtn");
        var content = document.getElementById("content");
        
        btn.onclick = function() {
            content.innerHTML = "<strong>Boom!</strong> Content updated via innerHTML.";
            content.style.backgroundColor = "#e94560";
            content.style.color = "#16213e";
            console_log("Content was updated dynamically!");
        };
    </script>
</body>
</html>
